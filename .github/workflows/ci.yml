name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      # Surface-drift guard — regenerate the component inventory and fail
      # the build if it differs from the checked-in snapshot. Prevents
      # silent additions / removals of the public surface.
      - name: Regenerate component inventory
        run: pnpm docs:inventory

      - name: Fail if inventory drifted
        run: |
          if ! git diff --quiet -- docs/COMPONENT-INVENTORY.json; then
            echo "::error::Component inventory drifted from the checked-in snapshot."
            echo "Run 'pnpm docs:inventory' locally and commit the updated docs/COMPONENT-INVENTORY.json."
            echo ""
            echo "Diff:"
            git --no-pager diff -- docs/COMPONENT-INVENTORY.json
            exit 1
          fi
