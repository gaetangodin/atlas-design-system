# Netlify config for the Atlas design system.
#
# This site serves Storybook (the canonical component playground) at
# https://atlas-design.netlify.app. The Next.js app under playground/
# is kept in the repo for local prototyping but is no longer published.

[build]
  # Build at the repo root so the root pnpm-lock.yaml drives the install.
  base = "."
  # corepack provisions the pnpm version pinned in package.json
  # ("packageManager"). --frozen-lockfile makes the cloud install
  # match local exactly. Then build-storybook produces storybook-static/.
  command = "corepack enable && pnpm install --frozen-lockfile && pnpm build-storybook"
  publish = "storybook-static"

[build.environment]
  NODE_VERSION = "20"
