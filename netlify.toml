# Netlify config for the Atlas design-system playground.
#
# The Next.js app lives under playground/ in this repo.
# `base` tells Netlify to cd into that folder before installing/building;
# Netlify's Essential Next.js Runtime then handles the SSR routing.

[build]
  base = "playground"
  # The Atlas library's TypeScript source (in ../src) is compiled in via
  # Next's externalDir. Its non-optional deps (@heroui/*, clsx,
  # tailwind-merge, …) only resolve if a node_modules also exists at the
  # repo root, so we install there before installing in playground.
  command = "npm install --prefix .. --legacy-peer-deps --no-audit --no-fund && npm install --legacy-peer-deps --no-audit --no-fund && npm run build"
  publish = ".next"

[build.environment]
  # The HeroUI subpackages declare conflicting peer-dep ranges; this is
  # the standard workaround and mirrors the local playground/.npmrc.
  NPM_FLAGS = "--legacy-peer-deps"
  # Pin Node so local dev and Netlify agree.
  NODE_VERSION = "20"

# The Essential Next.js plugin is auto-installed by Netlify for Next apps,
# but listing it here makes the configuration explicit.
[[plugins]]
  package = "@netlify/plugin-nextjs"
